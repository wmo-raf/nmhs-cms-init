upstream cms_web {
    server cms_web:8000;
}

upstream cms_mapviewer {
    server cms_mapviewer:3000;
}

server {

    listen 80;

    location / {
        proxy_pass http://cms_web/;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        client_max_body_size 100M;
        proxy_redirect off;
    }

    location /static/ {
        alias /wagtail_static/;
    }

    location /media/ {
        alias /wagtail_media/;
    }

    location /_next/static/ {
        alias /mapviewer_static/;
        expires max;
        add_header Cache-Control "public";
    }

    location /_next/ {
        proxy_set_header  x-real-ip $remote_addr;
        proxy_pass  http://cms_mapviewer/;
    }

    # location /next/ {
    #     alias NEXTJS_PATH/public/next/;
    #     expires max;
    #     add_header Cache-Control "public";
    # }

}
