version: '3'

services:
  cms_web:
    container_name: cms_web
    build: 
        context: cms
        dockerfile: Dockerfile
    restart: always
    command: sh -c "/wait && gunicorn nmhs_cms.wsgi:application --bind 0.0.0.0:8000" 
    expose:
      - 8000
    environment: 
      - DEBUG=${DEBUG}
      - DB_PORT_CMS=${POSTGRES_PORT_CMS}
      - DB_NAME_CMS=${POSTGRES_DB_CMS}
      - DB_PASSWORD_CMS=${POSTGRES_PASSWORD_CMS}
      - DB_USER_CMS=${POSTGRES_USER_CMS}
      - DB_HOST_CMS=cms_db
      - RECAPTCHA_PUBLIC_KEY=${RECAPTCHA_PUBLIC_KEY}
      - RECAPTCHA_PRIVATE_KEY=${RECAPTCHA_PRIVATE_KEY}
      - ENVIRONMENT=${ENVIRONMENT}
      - DATABASE=${DATABASE}
      - BASE_PATH=${BASE_PATH}
      - CMS_HOST=${CMS_HOST}
      - WAIT_HOSTS=cms_db:5432
      - WAIT_TIMEOUT=120
      - NEXTJS_SERVER_URL=${NEXTJS_SERVER_URL}

    depends_on:
      - cms_db
    ports:
      - 8000
    volumes:
      # - ./entrypoint.sh:/entrypoint.sh
      - ./cms/static:/home/app/web/nmhs-cms/static
      - ./cms/media:/home/app/web/nmhs-cms/media
      - ./cms/error.log:/home/app/web/nmhs-cms/error.log
      - ./cms/cache:/home/app/web/nmhs-cms/cache
      - ./cms/dumpdata.json:/home/app/web/nmhs-cms/dumpdata.json
     
  cms_db:
    container_name: cms_db
    image: postgis/postgis:12-master
    restart: always
    environment: 
      - POSTGRES_USER=${POSTGRES_USER_CMS}
      - POSTGRES_DB=${POSTGRES_DB_CMS}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD_CMS}
    ports: 
      - ${POSTGRES_PORT_CMS}
    volumes:
      - postgres_data:/var/lib/postgresql/data/

  cms_mapviewer:
    container_name: cms_mapviewer
    platform: linux/x86_64
    build:
      context: mapviewer
      dockerfile: Dockerfile
      args:
        - NODE_ENV=${NODE_ENV}
        - ANALYTICS_PROPERTY_ID=${ANALYTICS_PROPERTY_ID}
        - BITLY_TOKEN=${BITLY_TOKEN}
        - DEBUG= ${DEBUG}
        - GOOGLE_CUSTOM_SEARCH_CX=${GOOGLE_CUSTOM_SEARCH_CX}
        - GOOGLE_SEARCH_API_KEY=${GOOGLE_SEARCH_API_KEY}
        - CMS_API=${MAPVIEWER_API}
    ports:
      - 3000:3000
    volumes:
      - mapviewer_data:/home/app/geomapviewer/.next/static

  cms_nginx:
    container_name: cms_nginx
    image: nginx:1.18.0-alpine
    volumes:
      - ./cms/static:/wagtail_static
      - ./cms/media:/wagtail_media
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - mapviewer_data:/mapviewer_static

    ports:
      - ${CMS_PORT}:80
    depends_on:
      - cms_web  


networks:
    default:
      name:  ${AHW_DOCKER_NETWORK}
      external: true


volumes:
  postgres_data:
  mapviewer_data:
  mysql_data:
    driver: local
 